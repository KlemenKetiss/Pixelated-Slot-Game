name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure assets folder for static copy (Linux case-sensitivity)
        run: |
          if [ -d "Assets" ]; then
            rm -rf assets
            cp -r Assets assets
          fi

      - name: Build
        run: npm run build

      - name: Copy assets into dist (Images→images for case-sensitive hosting)
        run: |
          mkdir -p dist/assets/images
          if [ -d "Assets/Images" ]; then
            cp -r Assets/Images/* dist/assets/images/
          elif [ -d "assets/images" ]; then
            cp -r assets/images/* dist/assets/images/
          fi
          if [ -f "Assets/manifest.json" ]; then
            cp Assets/manifest.json dist/assets/
          elif [ -f "assets/manifest.json" ]; then
            cp assets/manifest.json dist/assets/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
